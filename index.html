<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taylor Swift – Opalite · Fragmento 1:25</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@200;300;400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #0a0a0f;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Jost', sans-serif;
    overflow: hidden;
  }

  .bg {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at 30% 40%, #1a0a2e 0%, transparent 60%),
                radial-gradient(ellipse at 70% 70%, #0d1a2e 0%, transparent 55%),
                #060610;
    z-index: 0;
  }

  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.25;
    animation: drift 8s ease-in-out infinite alternate;
  }
  .orb1 { width: 400px; height: 400px; background: #b89ce0; top: -100px; left: -100px; animation-delay: 0s; }
  .orb2 { width: 300px; height: 300px; background: #7ec8e3; bottom: -80px; right: -80px; animation-delay: -4s; }

  @keyframes drift {
    from { transform: translate(0, 0) scale(1); }
    to   { transform: translate(30px, 20px) scale(1.08); }
  }

  .card {
    position: relative; z-index: 1;
    width: 380px;
    padding: 40px 36px 36px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    backdrop-filter: blur(24px);
    box-shadow: 0 30px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.08);
    text-align: center;
  }

  .gem {
    font-size: 42px;
    margin-bottom: 16px;
    display: block;
    filter: drop-shadow(0 0 16px rgba(184,156,224,0.6));
    animation: pulse 3s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { filter: drop-shadow(0 0 16px rgba(184,156,224,0.5)); transform: scale(1); }
    50%      { filter: drop-shadow(0 0 28px rgba(184,156,224,0.9)); transform: scale(1.06); }
  }

  .artist {
    font-weight: 200;
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
    margin-bottom: 6px;
  }

  .title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 32px;
    color: #fff;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }

  .subtitle {
    font-size: 11px;
    font-weight: 200;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.3);
    margin-bottom: 28px;
  }

  .progress-wrap {
    position: relative;
    height: 3px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    margin-bottom: 10px;
    cursor: pointer;
    overflow: visible;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #b89ce0, #7ec8e3);
    border-radius: 10px;
    width: 0%;
    transition: width 0.3s linear;
    position: relative;
  }
  .progress-fill::after {
    content: '';
    position: absolute;
    right: -4px; top: -3px;
    width: 9px; height: 9px;
    background: #fff;
    border-radius: 50%;
    box-shadow: 0 0 8px rgba(184,156,224,0.8);
  }

  .fade-marker {
    position: absolute;
    right: 0; top: -6px;
    height: 15px;
    width: calc(3 / 85 * 100%);
    background: rgba(184,156,224,0.25);
    border-radius: 4px;
    pointer-events: none;
  }
  .fade-label {
    position: absolute;
    right: 0; top: -20px;
    font-size: 9px;
    letter-spacing: 1.5px;
    color: rgba(184,156,224,0.5);
    text-transform: uppercase;
    font-weight: 200;
  }

  .times {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    font-weight: 200;
    color: rgba(255,255,255,0.35);
    margin-bottom: 24px;
    letter-spacing: 1px;
  }

  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    margin-bottom: 24px;
  }

  .btn-play {
    width: 60px; height: 60px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, #b89ce0, #7ec8e3);
    color: #0a0a0f;
    font-size: 22px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 8px 24px rgba(184,156,224,0.35);
  }
  .btn-play:hover { transform: scale(1.08); box-shadow: 0 12px 32px rgba(184,156,224,0.5); }
  .btn-play:active { transform: scale(0.97); }

  .btn-reset {
    width: 38px; height: 38px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.05);
    color: rgba(255,255,255,0.5);
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .btn-reset:hover { background: rgba(255,255,255,0.1); color: #fff; }

  .vol-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
    padding: 10px 14px;
    border-radius: 10px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
  }
  .vol-icon { font-size: 13px; color: rgba(255,255,255,0.4); min-width: 16px; }
  .vol-bar-bg {
    flex: 1;
    height: 3px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    overflow: hidden;
  }
  .vol-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #b89ce0, #7ec8e3);
    border-radius: 10px;
    width: 100%;
    transition: width 0.15s linear;
  }
  .vol-pct {
    font-size: 10px;
    font-weight: 200;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.3);
    min-width: 30px;
    text-align: right;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 14px;
    border-radius: 20px;
    background: rgba(184,156,224,0.1);
    border: 1px solid rgba(184,156,224,0.2);
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 1.5px;
    color: rgba(184,156,224,0.8);
    margin-bottom: 28px;
  }
  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #b89ce0;
    animation: blink 1.5s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  .note {
    font-size: 10px;
    font-weight: 200;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.2);
    text-transform: uppercase;
  }

  #yt-player { display: none; }
</style>
</head>
<body>

<div class="bg"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="card">
  <span class="gem">🪨</span>
  <div class="artist">Taylor Swift</div>
  <div class="title">Opalite</div>
  <div class="subtitle">LYRIC VIDEO · FRAGMENTO 0:00 – 1:25</div>

  <div class="badge">
    <span class="dot"></span>
    <span id="status-text">LISTO PARA REPRODUCIR</span>
  </div>

  <div class="progress-wrap" id="prog-wrap">
    <div class="progress-fill" id="prog-fill"></div>
    <div class="fade-marker"></div>
    <div class="fade-label">fade ↓</div>
  </div>
  <div class="times">
    <span id="cur-time">0:00</span>
    <span>1:25</span>
  </div>

  <div class="vol-row">
    <span class="vol-icon" id="vol-icon">🔊</span>
    <div class="vol-bar-bg">
      <div class="vol-bar-fill" id="vol-bar"></div>
    </div>
    <span class="vol-pct" id="vol-pct">100%</span>
  </div>

  <div class="controls">
    <button class="btn-reset" id="btn-reset" title="Reiniciar">↺</button>
    <button class="btn-play" id="btn-play">▶</button>
    <div style="width:38px"></div>
  </div>

  <div class="note">Fade out automático en los últimos 3 seg</div>
</div>

<div id="yt-player"></div>

<script>
  const END_TIME   = 85;   // 1:25 en segundos
  const FADE_START = 82;   // empieza fade 3 seg antes

  let player, playing = false, ticker, fadeInterval;

  const tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(tag);

  window.onYouTubeIframeAPIReady = function() {
    player = new YT.Player('yt-player', {
      videoId: '3PJC6uPIekc',
      playerVars: { autoplay: 0, controls: 0, start: 0, rel: 0 },
      events: {
        onReady: () => { player.setVolume(100); setStatus('LISTO PARA REPRODUCIR'); },
        onStateChange: onState
      }
    });
  };

  function onState(e) {
    if (e.data === YT.PlayerState.PLAYING) {
      playing = true;
      document.getElementById('btn-play').textContent = '⏸';
      setStatus('REPRODUCIENDO');
      ticker = setInterval(tick, 100);
    } else if (e.data === YT.PlayerState.PAUSED) {
      playing = false;
      document.getElementById('btn-play').textContent = '▶';
      setStatus('PAUSADO');
      clearInterval(ticker);
    } else if (e.data === YT.PlayerState.ENDED) {
      finishUp();
    }
  }

  function tick() {
    if (!player) return;
    const t = player.getCurrentTime();
    if (t >= END_TIME) { finishUp(); return; }
    updateProgress(t);
    if (t >= FADE_START && !fadeInterval) startFade();
  }

  function startFade() {
    clearInterval(fadeInterval);
    setStatus('FADE OUT...');
    fadeInterval = setInterval(() => {
      if (!player) return;
      const t = player.getCurrentTime();
      const remaining = END_TIME - t;
      if (remaining <= 0) { finishUp(); return; }
      const vol = Math.max(0, Math.round((remaining / 3) * 100));
      player.setVolume(vol);
      updateVolUI(vol);
      if (vol <= 0) finishUp();
    }, 100);
  }

  function finishUp() {
    if (player) { player.pauseVideo(); player.seekTo(0); player.setVolume(100); }
    playing = false;
    clearInterval(ticker);
    clearInterval(fadeInterval);
    fadeInterval = null;
    document.getElementById('btn-play').textContent = '▶';
    updateProgress(0);
    updateVolUI(100);
    setStatus('✨ FIN DEL BAILE');
  }

  function updateProgress(t) {
    const pct = Math.min((t / END_TIME) * 100, 100);
    document.getElementById('prog-fill').style.width = pct + '%';
    document.getElementById('cur-time').textContent = fmt(t);
  }

  function updateVolUI(vol) {
    document.getElementById('vol-bar').style.width = vol + '%';
    document.getElementById('vol-pct').textContent = vol + '%';
    document.getElementById('vol-icon').textContent = vol > 50 ? '🔊' : vol > 0 ? '🔉' : '🔇';
  }

  function fmt(s) {
    const m = Math.floor(s / 60), sec = Math.floor(s % 60);
    return m + ':' + String(sec).padStart(2, '0');
  }

  function setStatus(txt) {
    document.getElementById('status-text').textContent = txt;
  }

  document.getElementById('btn-play').addEventListener('click', () => {
    if (!player) return;
    if (playing) player.pauseVideo();
    else player.playVideo();
  });

  document.getElementById('btn-reset').addEventListener('click', () => {
    if (!player) return;
    clearInterval(ticker);
    clearInterval(fadeInterval);
    fadeInterval = null;
    player.seekTo(0);
    player.pauseVideo();
    player.setVolume(100);
    updateProgress(0);
    updateVolUI(100);
    setStatus('LISTO PARA REPRODUCIR');
  });

  document.getElementById('prog-wrap').addEventListener('click', (e) => {
    if (!player) return;
    clearInterval(fadeInterval);
    fadeInterval = null;
    player.setVolume(100);
    updateVolUI(100);
    const rect = e.currentTarget.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    const t = Math.min(pct * END_TIME, END_TIME - 0.1);
    player.seekTo(t);
    updateProgress(t);
  });
</script>

</body>
</html>
